<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Agenda</title>
 
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
   
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
 
    <style>
        body {
            background-color: #f4f6f9;
        }
 
        .sidebar {
            height: 100vh;
            background-color: #212529;
            color: white;
            position: fixed;
            width: 250px;
        }
 
        .sidebar a {
            color: #adb5bd;
            text-decoration: none;
            display: block;
            padding: 12px 20px;
        }
 
        .sidebar a:hover {
            background-color: #343a40;
            color: white;
        }
 
        .sidebar .active {
            background-color: #0d6efd;
            color: white;
        }
 
        .content {
            margin-left: 250px;
            padding: 30px;
        }
 
        .navbar-custom {
            margin-left: 250px;
            background-color: white;
            border-bottom: 1px solid #dee2e6;
        }
 
        .card-dashboard {
            border: none;
            border-radius: 12px;
        }
    </style>
</head>
 
<body>
 
<!-- Sidebar -->
<div class="sidebar d-flex flex-column p-3">
 
    <h4 class="text-center mb-4">
        <i class="bi bi-person-lines-fill"></i> Agenda
    </h4>
 
    <a href="/" class="active">
        <i class="bi bi-house-door"></i> Dashboard
    </a>
 
    <a href="/">
        <i class="bi bi-people"></i> Lista Personas
    </a>
 
    <a href="/crear/">
        <i class="bi bi-person-plus"></i> Registrar Persona
    </a>
 
    <hr class="bg-secondary">
 
    <a href="/admin/">
        <i class="bi bi-gear"></i> Administración
    </a>
 
</div>
 
<!-- Navbar Superior -->
<nav class="navbar navbar-expand-lg navbar-light navbar-custom px-4">
    <div class="container-fluid">
 
        <span class="navbar-brand fw-bold">
            Sistema de Gestión
        </span>
 
        <div class="ms-auto">
            <span class="me-3">
                <i class="bi bi-person-circle"></i> Usuario
            </span>
        </div>
 
    </div>
</nav>
 
<!-- Contenido -->
<div class="content">
 
    {% block content %}
    {% endblock %}
 
</div>
 
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
 
</body>
</html>
